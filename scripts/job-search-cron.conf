# OpenClaw Cron Configuration - Job Search Automation
# Schedule: Every 3-5 days
# Task: Pull React/React Native jobs + YC startups
# Target: Nigeria-eligible remote roles
# Output: Jarvis-Job-Search Telegram group + memory/job-search.md

# Cron format: minute hour day-of-month month day-of-week command

# RUN EVERY 3 DAYS AT 2:00 PM UTC (Nigeria friendly timezone)
0 14 */3 * * /home/claw/.openclaw/workspace/scripts/job-search-pull.sh >> /home/claw/.openclaw/workspace/logs/job-search-cron.log 2>&1

# Alternative: Run daily at 2:00 PM UTC (more frequent)
# 0 14 * * * /home/claw/.openclaw/workspace/scripts/job-search-pull.sh

# Alternative: Run twice per week (Mon/Thu at 2 PM UTC)
# 0 14 * * 1,4 /home/claw/.openclaw/workspace/scripts/job-search-pull.sh

# SETUP INSTRUCTIONS:
# 1. Make script executable: chmod +x /home/claw/.openclaw/workspace/scripts/job-search-pull.sh
# 2. Add cron job: crontab -e
# 3. Paste one of the lines above (uncomment the desired frequency)
# 4. Save and verify: crontab -l
#
# LOGS:
# Monitor logs: tail -f /home/claw/.openclaw/workspace/logs/job-search-cron.log
# Last run: grep -i "job search pull" /home/claw/.openclaw/workspace/logs/job-search-cron.log | tail -5
