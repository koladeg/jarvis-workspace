# Truck search automation schedule
# WAT = UTC+1, so 23:00 WAT = 22:00 UTC.
# Every 3 days at 22:00 UTC (~11 PM WAT), cron-ready.
0 22 */3 * * /home/claw/.openclaw/workspace/scripts/truck-search-automation.sh >> /home/claw/.openclaw/workspace/logs/truck-search-cron.log 2>&1

