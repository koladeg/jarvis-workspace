<svg xmlns='http://www.w3.org/2000/svg' width='1400' height='760' viewBox='0 0 1400 760'><style>.title{font:700 24px Inter,Arial}.sub{font:14px Inter,Arial;fill:#475569}.h{font:700 16px Inter,Arial}.f{font:13px Inter,Arial;fill:#334155}.box{fill:#fff;stroke:#93c5fd;stroke-width:2;rx:16}.line{stroke:#60a5fa;stroke-width:3;fill:none;marker-end:url(#m)}.rel{font:12px Inter,Arial;fill:#0369a1}</style><defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#60a5fa'/></marker></defs><rect width='100%' height='100%' fill='#f8fbff'/><text x='36' y='40' class='title'>Orisynx MVP data model</text><text x='36' y='66' class='sub'>Primary entities, key fields, and core relationships for audit planning, execution, findings, CAPA, and approvals.</text><g transform='translate(40,110)'><rect x='0' y='0' width='260' height='150' class='box'/><text x='16' y='28' class='h'>AuditProgram</text><text x='16' y='54' class='f'>id (PK)</text><text x='16' y='74' class='f'>name</text><text x='16' y='94' class='f'>version</text><text x='16' y='114' class='f'>status</text><text x='16' y='134' class='f'>default_task_template_set</text><rect x='340' y='0' width='280' height='190' class='box'/><text x='356' y='28' class='h'>Audit</text><text x='356' y='54' class='f'>id (PK)</text><text x='356' y='74' class='f'>audit_program_id (FK)</text><text x='356' y='94' class='f'>name, site, area</text><text x='356' y='114' class='f'>planned_start, planned_end</text><text x='356' y='134' class='f'>status, lock_version</text><text x='356' y='154' class='f'>owner_user_id, approver_user_id</text><text x='356' y='174' class='f'>created_from_template, csv_import_batch_id</text><rect x='700' y='0' width='260' height='170' class='box'/><text x='716' y='28' class='h'>Task</text><text x='716' y='54' class='f'>id (PK)</text><text x='716' y='74' class='f'>audit_id (FK)</text><text x='716' y='94' class='f'>program_test_ref</text><text x='716' y='114' class='f'>status, risk_band, assignee_id</text><text x='716' y='134' class='f'>result, due_at</text><text x='716' y='154' class='f'>requires_evidence (bool)</text><rect x='1040' y='0' width='280' height='180' class='box'/><text x='1056' y='28' class='h'>Evidence</text><text x='1056' y='54' class='f'>id (PK)</text><text x='1056' y='74' class='f'>task_id (FK)</text><text x='1056' y='94' class='f'>audit_id (FK)</text><text x='1056' y='114' class='f'>file_url, mime_type, ocr_text</text><text x='1056' y='134' class='f'>captured_by, captured_at</text><text x='1056' y='154' class='f'>classification, metadata_json</text><rect x='700' y='280' width='280' height='190' class='box'/><text x='716' y='308' class='h'>Finding</text><text x='716' y='334' class='f'>id (PK)</text><text x='716' y='354' class='f'>audit_id (FK), task_id (FK)</text><text x='716' y='374' class='f'>severity, status</text><text x='716' y='394' class='f'>observation, criterion, risk_statement</text><text x='716' y='414' class='f'>owner_id, due_at</text><text x='716' y='434' class='f'>approved_at, approved_by</text><rect x='1040' y='300' width='260' height='170' class='box'/><text x='1056' y='328' class='h'>CAPA</text><text x='1056' y='354' class='f'>id (PK)</text><text x='1056' y='374' class='f'>finding_id (FK)</text><text x='1056' y='394' class='f'>action_type, owner_id</text><text x='1056' y='414' class='f'>target_date, status</text><text x='1056' y='434' class='f'>effectiveness_check</text><rect x='340' y='320' width='280' height='170' class='box'/><text x='356' y='348' class='h'>Approval</text><text x='356' y='374' class='f'>id (PK)</text><text x='356' y='394' class='f'>audit_id (FK)</text><text x='356' y='414' class='f'>approval_type, decision</text><text x='356' y='434' class='f'>decided_by, decided_at</text><text x='356' y='454' class='f'>comment, unlock_reason</text><path d='M260 75 H340' class='line'/><text x='280' y='66' class='rel'>1 program → many audits</text><path d='M620 84 H700' class='line'/><text x='636' y='74' class='rel'>1 audit → many tasks</text><path d='M960 85 H1040' class='line'/><text x='975' y='75' class='rel'>1 task → many evidence</text><path d='M830 170 V280' class='line'/><text x='842' y='230' class='rel'>0..1 failed task → 0..n findings</text><path d='M980 378 H1040' class='line'/><text x='985' y='368' class='rel'>1 finding → 0..n CAPAs</text><path d='M500 190 V320' class='line'/><text x='512' y='256' class='rel'>1 audit → n approvals / unlocks</text><path d='M620 360 H700' class='line'/><text x='638' y='350' class='rel'>approval decides audit/finding state</text></g></svg>