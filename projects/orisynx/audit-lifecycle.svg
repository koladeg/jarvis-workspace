<svg xmlns='http://www.w3.org/2000/svg' width='1280' height='280' viewBox='0 0 1280 280'><style>.t{font:700 22px Inter,Arial}.s{font:14px Inter,Arial;fill:#475569}.b{fill:#fff;stroke:#93c5fd;stroke-width:3;rx:18}.a{stroke:#60a5fa;stroke-width:4;fill:none;marker-end:url(#m)}</style><defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#60a5fa'/></marker></defs><rect width='100%' height='100%' fill='#f8fbff'/><text x='40' y='40' class='t'>Audit lifecycle</text><text x='40' y='66' class='s'>Planned → Active → In Review → Approved → Closed, with lock points and permitted actions.</text><rect x='40' y='110' width='180' height='90' class='b'/><text x='83' y='145' class='t' style='font-size:24px'>Planned</text><text x='67' y='173' class='s'>Editable scope, dates, team,</text><text x='80' y='192' class='s'>template activation preview</text><rect x='290' y='110' width='180' height='90' class='b'/><text x='350' y='145' class='t' style='font-size:24px'>Active</text><text x='330' y='173' class='s'>Tasks execute, evidence</text><text x='342' y='192' class='s'>attached, findings drafted</text><rect x='540' y='110' width='180' height='90' class='b'/><text x='580' y='145' class='t' style='font-size:24px'>In Review</text><text x='575' y='173' class='s'>Lead review, revisions,</text><text x='590' y='192' class='s'>approval request raised</text><rect x='790' y='110' width='180' height='90' class='b'/><text x='840' y='145' class='t' style='font-size:24px'>Approved</text><text x='815' y='173' class='s'>Baseline locked, view/export,</text><text x='829' y='192' class='s'>unlock by approved workflow</text><rect x='1040' y='110' width='180' height='90' class='b'/><text x='1097' y='145' class='t' style='font-size:24px'>Closed</text><text x='1072' y='173' class='s'>Final archive, CAPA follow-up,</text><text x='1086' y='192' class='s'>record retained</text><path d='M220 155 H290' class='a'/><path d='M470 155 H540' class='a'/><path d='M720 155 H790' class='a'/><path d='M970 155 H1040' class='a'/><text x='820' y='232' class='s'>Lock trigger: approval timestamp + approver identity + version snapshot</text></svg>