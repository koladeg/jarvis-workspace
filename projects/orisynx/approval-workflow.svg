<svg xmlns='http://www.w3.org/2000/svg' width='1280' height='340' viewBox='0 0 1280 340'><style>.t{font:700 22px Inter,Arial}.s{font:14px Inter,Arial;fill:#475569}.b{fill:#fff;stroke:#c4b5fd;stroke-width:3;rx:18}.a{stroke:#8b5cf6;stroke-width:4;fill:none;marker-end:url(#m)}</style><defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#8b5cf6'/></marker></defs><rect width='100%' height='100%' fill='#faf8ff'/><text x='40' y='42' class='t'>Approval and locking workflow</text><text x='40' y='68' class='s'>Review gates, record locking, and controlled unlock path for revisions.</text><rect x='50' y='115' width='230' height='90' class='b'/><text x='82' y='148' class='t' style='font-size:22px'>Submit for review</text><text x='82' y='178' class='s'>Audit lead requests team lead review</text><rect x='340' y='115' width='230' height='90' class='b'/><text x='374' y='148' class='t' style='font-size:22px'>Team lead review</text><text x='370' y='178' class='s'>Approve, reject, or request changes</text><rect x='630' y='115' width='230' height='90' class='b'/><text x='668' y='148' class='t' style='font-size:22px'>Approval lock</text><text x='659' y='178' class='s'>Freeze baseline + version snapshot</text><rect x='920' y='115' width='260' height='90' class='b'/><text x='950' y='148' class='t' style='font-size:22px'>Unlock for revision</text><text x='965' y='178' class='s'>Approver grants temporary unlock</text><path d='M280 160 H340' class='a'/><path d='M570 160 H630' class='a'/><path d='M860 160 H920' class='a'/><path d='M1048 205 C1048 265, 700 265, 700 205' class='a'/><text x='660' y='294' class='s'>Unlock creates an audit trail event, increments working version, and requires re-approval.</text><text x='373' y='227' class='s'>Rejection path returns audit to In Review with comments.</text></svg>