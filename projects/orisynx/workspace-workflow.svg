<svg xmlns='http://www.w3.org/2000/svg' width='1280' height='360' viewBox='0 0 1280 360'><style>.t{font:700 22px Inter,Arial}.s{font:14px Inter,Arial;fill:#475569}.b{fill:#fff;stroke:#7dd3fc;stroke-width:3;rx:18}.a{stroke:#38bdf8;stroke-width:4;fill:none;marker-end:url(#m)}</style><defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#38bdf8'/></marker></defs><rect width='100%' height='100%' fill='#f6fdff'/><text x='40' y='42' class='t'>Workspace workflow</text><text x='40' y='68' class='s'>Unified operational path from program selection through exception raising.</text><rect x='40' y='110' width='190' height='88' class='b'/><text x='78' y='145' class='t' style='font-size:22px'>1. Select program</text><text x='71' y='174' class='s'>Open assigned audit/program</text><rect x='280' y='110' width='190' height='88' class='b'/><text x='315' y='145' class='t' style='font-size:22px'>2. Perform tests</text><text x='314' y='174' class='s'>Work task queue in context</text><rect x='520' y='110' width='190' height='88' class='b'/><text x='554' y='145' class='t' style='font-size:22px'>3. Attach evidence</text><text x='555' y='174' class='s'>Files, notes, photos, links</text><rect x='760' y='110' width='220' height='88' class='b'/><text x='790' y='145' class='t' style='font-size:22px'>4. Document findings</text><text x='796' y='174' class='s'>Observation, criterion, risk</text><rect x='1030' y='110' width='210' height='88' class='b'/><text x='1062' y='145' class='t' style='font-size:22px'>5. Raise exceptions</text><text x='1068' y='174' class='s'>Notify lead for blockers/criticals</text><path d='M230 154 H280' class='a'/><path d='M470 154 H520' class='a'/><path d='M710 154 H760' class='a'/><path d='M980 154 H1030' class='a'/><rect x='760' y='250' width='220' height='70' class='b' style='stroke:#f59e0b'/><text x='828' y='279' class='t' style='font-size:20px'>If fail</text><text x='788' y='302' class='s'>Finding required before completion</text><path d='M870 198 V250' class='a'/></svg>